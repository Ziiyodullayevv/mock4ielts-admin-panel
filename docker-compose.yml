services:
  admin:
    image: ghcr.io/ziiyodullayevv/mock4ielts-admin-panel:latest
    container_name: mock4ielts-admin
    restart: unless-stopped
    ports:
      - '127.0.0.1:8083:8083'
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:8083']
      interval: 30s
      timeout: 5s
      retries: 3
